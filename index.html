<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Набор в клан 𝕃𝕠𝕤𝕥ℙ𝕒𝕣𝕠𝕕𝕚𝕤𝔼</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: url('file_0000000025587243ada0f5a38ab3f84e.png') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}
h2, h3 { text-align: center; }
#registration, #welcome, #profiles { 
    background: rgba(0,0,0,0.6); 
    padding: 20px; 
    border-radius: 15px; 
    box-shadow: 0 0 15px rgba(0,0,0,0.5); 
    margin-bottom: 20px; 
}
input, select, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; border-radius: 5px; border: none; }
button { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; background: #4CAF50; color: #fff; font-weight: bold; }
.announcement { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center; line-height: 1.5; margin-bottom: 20px; }
.profile { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; }
.profile-info { flex: 1; white-space: pre-line; }
.like { background: #4CAF50; margin-left:5px; }
.dislike { background: #f44336; margin-left:5px; }
#welcome img { width: 100%; border-radius: 15px; margin-bottom: 15px; }
</style>
</head>
<body>
<div class="container">



<div id="welcome" style="display:none;">
    <h2 id="greeting"></h2>
    <div class="announcement">
        Набор в клан 𝕃𝕠𝕤𝕥ℙ𝕒𝕣𝕠𝕕𝕚𝕤𝔼 будем рады всем.<br>
        По вопросам писать в TG: @berserkprime<br>
        С вас требуется Активность и адекватность.<br>
        Смена ника не обязательна ✨
    </div>

    <h3>Отправить свою анкету</h3>
    <div id="registrationForm">
        <input type="text" id="pName" placeholder="Имя">
        <input type="text" id="pNick" placeholder="Ник">
        <input type="number" id="pAge" placeholder="Возраст">
        <input type="text" id="pID" placeholder="Айди">
        <input type="text" id="pTime" placeholder="Время (МСК)">
        <select id="pActive">
            <option value="Актив">Актив</option>
            <option value="Не актив">Не актив</option>
        </select>
        <input type="text" id="pAdequate" placeholder="Адекватность">
        <input type="text" id="pTelegram" placeholder="Telegram">
        <button onclick="submitProfile()">Отправить анкету</button>
    </div>
</div>

<div id="profiles" style="display:none;">
    <h3>Анкеты участников</h3>
    <div id="profileList"></div>
</div>

</div>

<script>
let profilesData = JSON.parse(localStorage.getItem('profilesData')) || [];

function registerUser() {
    const name = document.getElementById('userName').value.trim();
    if(!name) { alert("Введите имя!"); return; }

    document.getElementById('registration').style.display = 'none';
    document.getElementById('welcome').style.display = 'block';
    document.getElementById('profiles').style.display = 'block';
    document.getElementById('greeting').textContent = `Привет, ${name}!`;

    renderProfiles();
}

function submitProfile() {
    const profile = {
        name: document.getElementById('pName').value,
        nick: document.getElementById('pNick').value,
        age: document.getElementById('pAge').value,
        id: document.getElementById('pID').value,
        time: document.getElementById('pTime').value,
        active: document.getElementById('pActive').value,
        adequate: document.getElementById('pAdequate').value,
        telegram: document.getElementById('pTelegram').value
    };
    profilesData.push(profile);
    localStorage.setItem('profilesData', JSON.stringify(profilesData));
    renderProfiles();

    // Очистка формы
    document.getElementById('pName').value = '';
    document.getElementById('pNick').value = '';
    document.getElementById('pAge').value = '';
    document.getElementById('pID').value = '';
    document.getElementById('pTime').value = '';
    document.getElementById('pActive').value = 'Актив';
    document.getElementById('pAdequate').value = '';
    document.getElementById('pTelegram').value = '';
}

function renderProfiles() {
    const list = document.getElementById('profileList');
    list.innerHTML = '';
    profilesData.forEach((p, index) => {
        const div = document.createElement('div');
        div.className = 'profile';
        div.innerHTML = `
            <div class="profile-info">
<strong>${p.name}</strong>
Ник: ${p.nick}
Возраст: ${p.age}
Айди: ${p.id}
Время (МСК): ${p.time}
Активность: ${p.active}
Адекватность: ${p.adequate}
Telegram: ${p.telegram}
            </div>
            <div>
                <button class="like" onclick="likeProfile(${index})">👍</button>
                <button class="dislike" onclick="dislikeProfile(${index})">👎</button>
            </div>
        `;
        list.appendChild(div);
    });
}

function likeProfile(index){ alert(`Вы лайкнули ${profilesData[index].name}`); }
function dislikeProfile(index){ alert(`Вы дизлайкнули ${profilesData[index].name}`); }

// Автозагрузка при перезагрузке страницы
if(profilesData.length > 0){
    document.getElementById('welcome').style.display = 'block';
    document.getElementById('profiles').style.display = 'block';
    renderProfiles();
}


</script>
</body>
</html>

  const bgButton = document.getElementById('bgButton');

  const backgrounds = [
    'linear-gradient(-45deg, #ff7e5f, #feb47b, #6a11cb, #2575fc)',
    'linear-gradient(-45deg, #11998e, #38ef7d, #0f2027, #203a43)',

    'linear-gradient(-45deg, #2193b0, #6dd5ed, #cc2b5e, #753a88)'
  ];

  let currentIndex = 0;

  bgButton.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % backgrounds.length;
    document.body.style.background = backgrounds[currentIndex];
